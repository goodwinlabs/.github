name: "🐛 Bug Report"
description: File a structured report to help us improve the project.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Please provide as much information as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of what the bug is.
      placeholder: E.g., The application crashes when clicking the export button...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Tell us exactly how to trigger the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: Tell us what you expected to happen.
      placeholder: E.g., The file should download seamlessly.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you running?
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant logs, terminal output, or stack traces.
      render: bash
    validations:
      required: false

  - type: checkboxes
    id: checkboxes
    attributes:
      label: Code of Conduct Check
      description: Please ensure you follow our project protocols.
      options:
        - label: I have searched existing issues to ensure this bug is not a duplicate.
          required: true
